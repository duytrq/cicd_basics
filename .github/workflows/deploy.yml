name: deploy

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:
  deploy-staging:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Staging
        run: |
          echo "Deploying to Staging environment..."
          echo "Simulating SSH to Staging VM..."
          # Mock SSH deploy
          echo "SSH command: ssh user@staging-vm 'docker pull ghcr.io/${{ github.repository }}/demo-app:latest && docker compose up -d'"
          echo "Deployment to Staging completed successfully!"

  deploy-production:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to Production
        run: |
          echo "Deploying version ${{ github.ref_name }} to Production environment..."
          echo "Simulating SSH to Production VM..."
          # Mock SSH deploy
          echo "SSH command: ssh user@production-vm 'docker pull ghcr.io/${{ github.repository }}/demo-app:${{ github.ref_name }} && docker compose up -d'"
          echo "Deployment to Production completed successfully!"
