name: negative unsigned image test
on:
  workflow_dispatch:

jobs:
  build-unsigned:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.image.outputs.ref }}
      image_digest: ${{ steps.digest.outputs.digest }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435

      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: image
        run: echo "ref=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/demo-app" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.ref }}:unsigned-${{ github.run_id }}

      - id: digest
        env:
          IMAGE: ${{ steps.image.outputs.ref }}:unsigned-${{ github.run_id }}
        run: |
          digest="$(docker buildx imagetools inspect "$IMAGE" --format '{{.Manifest.Digest}}')"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Verify unsigned image is rejected
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/demo-app@${{ steps.build.outputs.digest }}
          EXPECTED_IDENTITY: ${{ github.server_url }}/${{ github.repository }}/.github/workflows/ci.yml@refs/heads/main
        run: |
          if cosign verify "$IMAGE" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            --certificate-identity="$EXPECTED_IDENTITY"; then
            echo "ERROR: unsigned image was accepted"
            exit 1
          fi

          echo "OK: unsigned image was rejected by Cosign verify"
