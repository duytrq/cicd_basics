name: negative unsigned image test

on:
  workflow_dispatch:

jobs:
  unsigned-image-should-be-rejected:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Define unsigned test image
        id: image
        run: echo "ref=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/demo-app" >> "$GITHUB_OUTPUT"

      - name: Build and push unsigned image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.ref }}:unsigned-${{ github.run_id }}

      - name: Resolve unsigned image digest
        id: digest
        env:
          IMAGE: ${{ steps.image.outputs.ref }}:unsigned-${{ github.run_id }}
        run: |
          digest="$(docker buildx imagetools inspect "$IMAGE" --format '{{.Manifest.Digest}}')"
          if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Invalid image digest: $digest" >&2
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Verify unsigned image is rejected
        env:
          IMAGE: ${{ steps.image.outputs.ref }}@${{ steps.digest.outputs.digest }}
          EXPECTED_IDENTITY: ${{ github.server_url }}/${{ github.repository }}/.github/workflows/ci.yml@refs/heads/main
        run: |
          if cosign verify "$IMAGE" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            --certificate-identity="$EXPECTED_IDENTITY"; then
            echo "ERROR: unsigned image was accepted"
            exit 1
          fi

          echo "OK: unsigned image was rejected by Cosign verify"
