name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - .github/workflows/test_deploy_unsigned.yml
  pull_request:
    branches: [main]
    paths:
      - app.js
      - db.js
      - app.test.js
      - dist/**
      - Dockerfile
      - .dockerignore
      - package.json
      - package-lock.json
      - eslint.config.js
      - .github/actions/**
      - .github/workflows/ci.yml
      - .github/workflows/deploy.yml
      - .github/workflows/release.yml
      - .github/workflows/reusable-build.yml

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
        os: [ubuntu-22.04, ubuntu-24.04]
        exclude:
          - { node: 18, os: ubuntu-24.04 }
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test

  build-and-push:
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/reusable-build.yml
    with:
      image_name: demo-app
      image_tag: sha-${{ github.sha }}

  sign-image:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with GitHub OIDC
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image_ref }}@${{ needs.build-and-push.outputs.image_digest }}
        run: cosign sign --yes "$IMAGE"

      - name: Verify signature identity
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image_ref }}@${{ needs.build-and-push.outputs.image_digest }}
          EXPECTED_IDENTITY: ${{ github.server_url }}/${{ github.repository }}/.github/workflows/ci.yml@refs/heads/main
        run: |
          cosign verify "$IMAGE" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            --certificate-identity="$EXPECTED_IDENTITY"

      - name: Move latest tag to verified digest
        env:
          IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
          IMAGE_DIGEST: ${{ needs.build-and-push.outputs.image_digest }}
        run: |
          docker buildx imagetools create \
            --tag "$IMAGE_REF:latest" \
            "$IMAGE_REF@$IMAGE_DIGEST"

          latest_digest="$(docker buildx imagetools inspect "$IMAGE_REF:latest" --format '{{.Manifest.Digest}}')"
          test "$latest_digest" = "$IMAGE_DIGEST"
