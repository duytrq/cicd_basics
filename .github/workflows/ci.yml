name: ci
on:
  push:
    branches: [main]
    paths:
      - app.js
      - db.js
      - app.test.js
      - dist/**
      - Dockerfile
      - .dockerignore
      - package.json
      - package-lock.json
      - eslint.config.js
      - .github/workflows/ci.yml
      - .github/workflows/reusable-build.yml
  pull_request:
    branches: [main]
    paths:
      - app.js
      - db.js
      - app.test.js
      - dist/**
      - Dockerfile
      - .dockerignore
      - package.json
      - package-lock.json
      - eslint.config.js
      - .github/workflows/ci.yml
      - .github/workflows/reusable-build.yml

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
      - run: npm run lint

  test:
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
        os: [ubuntu-22.04, ubuntu-24.04]
        exclude:
          - { node: 18, os: ubuntu-24.04 }
    runs-on: ${{matrix.os}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{matrix.node}}
          cache: 'npm'
      - run: npm ci
      - run: npm test

  build-and-push:
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/reusable-build.yml
    with:
      image_name: demo-app
      image_tag: sha-${{ github.sha }}
