name: Reusable Build

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      image_tag:
        required: true
        type: string
    outputs:
      image_ref:
        description: Image repository without a tag or digest
        value: ${{ jobs.build.outputs.image_ref }}
      image_digest:
        description: Immutable digest produced by the build
        value: ${{ jobs.build.outputs.image_digest }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.image.outputs.ref }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Define image reference
        id: image
        env:
          IMAGE_REF: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}
        run: echo "ref=${IMAGE_REF,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push immutable image
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.ref }}:${{ inputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate image digest
        id: digest
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          if [[ ! "$IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Invalid image digest: $IMAGE_DIGEST" >&2
            exit 1
          fi
          digest_hex="${IMAGE_DIGEST#sha256:}"
          echo "short_digest=${digest_hex:0:12}" >> "$GITHUB_OUTPUT"

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ steps.image.outputs.ref }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL
          scanners: vuln
          timeout: 10m0s

      - name: Generate SPDX JSON SBOM with Syft
        uses: anchore/sbom-action@f8bdd1d8ac5e901a77a92f111440fdb1b593736b # v0.20.6
        with:
          image: ${{ steps.image.outputs.ref }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: demo-app.sbom.spdx.json
          artifact-name: demo-app-sbom-${{ steps.digest.outputs.short_digest }}.spdx.json
          upload-artifact: true
          upload-artifact-retention: 30
          upload-release-assets: false

      - name: Validate SBOM
        run: |
          test -s demo-app.sbom.spdx.json
          jq -e '
            .spdxVersion | startswith("SPDX-")
          ' demo-app.sbom.spdx.json >/dev/null

      - name: Add supply-chain summary
        env:
          IMAGE_REF: ${{ steps.image.outputs.ref }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          SBOM_NAME: demo-app-sbom-${{ steps.digest.outputs.short_digest }}.spdx.json
        run: |
          {
            echo "## Supply-chain build"
            echo "- Image: \`$IMAGE_REF@$IMAGE_DIGEST\`"
            echo "- SBOM artifact: \`$SBOM_NAME\`"
            echo "- Trivy policy: reject fixable HIGH/CRITICAL vulnerabilities"
          } >> "$GITHUB_STEP_SUMMARY"
