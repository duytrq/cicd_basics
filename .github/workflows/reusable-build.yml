name: Reusable Build

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      image_tag:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Step 1: Build the image LOCALLY (do not push yet)
      - name: Build local image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true # This saves the image to the local docker daemon
          tags: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:test
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln'

      - name: Push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ inputs.image_tag }}
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:latest
          cache-from: type=gha
