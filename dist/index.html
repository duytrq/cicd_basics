<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CI/CD Tasks Demo</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div class="heading">
          <p class="eyebrow">Simple demo app</p>
          <h1>Task tracker</h1>
          <p class="summary">Create a task</p>
        </div>

        <form id="task-form" class="task-form">
          <label for="task-title">New task</label>
          <div class="task-input-row">
            <input
              id="task-title"
              name="title"
              maxlength="200"
              placeholder="Deploy the demo stack"
              autocomplete="off"
            />
            <button type="submit">Add</button>
          </div>
        </form>

        <div id="status" class="status" role="status">Loading tasks...</div>
        <ul id="tasks" class="tasks"></ul>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
